<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eb-Fazont | Prémium Kutyakozmetika & Spa</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #c5a059;
            --dark: #121212;
            --soft-cream: #fbf9f6;
            --white: #ffffff;
            --header-height: 80px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; scroll-padding-top: var(--header-height); }
        body { font-family: 'Montserrat', sans-serif; background: var(--white); color: var(--dark); line-height: 1.7; }

        /* --- EXKLUZÍV FIX FEJLÉC --- */
        nav {
            position: fixed; top: 0; width: 100%; height: var(--header-height); z-index: 1000;
            background: rgba(255, 255, 255, 0.95); display: flex; justify-content: space-between; 
            align-items: center; padding: 0 5%; transition: all 0.4s ease;
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        nav.scrolled { height: 65px; background: var(--white); box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        .logo { font-family: 'Playfair Display'; font-weight: 900; font-size: 1.5rem; color: var(--dark); letter-spacing: 2px; }
        .nav-links a { text-decoration: none; color: var(--dark); margin-left: 30px; font-weight: 600; font-size: 0.8rem; letter-spacing: 1px; transition: 0.3s; position: relative; }
        .nav-links a::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -5px; left: 0; background: var(--gold); transition: 0.3s; }
        .nav-links a:hover::after { width: 100%; }

        /* --- HERO --- */
        header {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?q=80&w=2071');
            background-size: cover; background-position: center; color: white; text-align: center;
        }

        /* --- SAJÁT IDŐPONTFOGLALÓ RENDSZER (MODUL) --- */
        .booking-system { padding: 100px 5%; background: var(--soft-cream); text-align: center; }
        .booking-card { 
            max-width: 900px; margin: 0 auto; background: var(--white); padding: 40px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.1); border-radius: 2px; display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;
        }
        .booking-step { border: 1px solid #eee; padding: 20px; transition: 0.3s; }
        .booking-step:hover { border-color: var(--gold); }
        .booking-step label { display: block; font-weight: 700; font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 10px; color: var(--gold); }
        .booking-step select, .booking-step input { width: 100%; border: none; font-family: 'Montserrat'; outline: none; font-size: 1rem; cursor: pointer; }
        .book-now-btn { 
            grid-column: 1 / -1; background: var(--dark); color: white; padding: 20px; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.4s; border: none;
        }
        .book-now-btn:hover { background: var(--gold); }

        /* --- GALÉRIA - JAVÍTOTT DESKTOP FÓKUSZ --- */
        .gallery-section { padding: 100px 5%; background: #000; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        
        .gallery-item { 
            aspect-ratio: 1/1; background-size: cover; background-position: center; 
            filter: grayscale(100%) brightness(0.6); transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
            border-radius: 4px;
        }

        /* JAVÍTÁS: Csak akkor homályosít, ha konkrét elemre mutatsz */
        .gallery-grid:has(.gallery-item:hover) .gallery-item:not(:hover) {
            filter: grayscale(100%) brightness(0.3) blur(4px);
            transform: scale(0.95);
        }
        .gallery-item:hover { 
            filter: grayscale(0%) brightness(1.1) blur(0); 
            transform: scale(1.05); z-index: 10; 
        }

        /* JAVÍTÁS: Mobil görgetés aktív osztály */
        .gallery-item.is-visible { filter: grayscale(0%) brightness(1); }

        /* --- LÁBLÉC & SZOCIÁLIS --- */
        footer { background: var(--dark); color: white; padding: 80px 5%; text-align: center; }
        .social-deep-links { margin-bottom: 30px; }
        .social-deep-links a { 
            color: white; font-size: 1.5rem; margin: 0 15px; transition: 0.3s; display: inline-block;
        }
        .social-deep-links a:hover { color: var(--gold); transform: translateY(-5px); }

        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .nav-links { display: none; }
            .booking-card { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav id="navbar">
        <div class="logo">EB-FAZONT</div>
        <div class="nav-links">
            <a href="#booking">IDŐPONT</a>
            <a href="#services">SZOLGÁLTATÁSOK</a>
            <a href="#gallery">GALÉRIA</a>
            <a href="#contact">KAPCSOLAT</a>
        </div>
    </nav>

    <header>
        <div class="hero-content">
            <h1 style="font-family: 'Playfair Display'; font-size: clamp(3rem, 10vw, 6rem); italic;">Gondoskodás & Stílus</h1>
            <p style="letter-spacing: 5px; margin-top: 20px;">PROFESSZIONÁLIS KUTYAKOZMETIKA ZUGLÓBAN</p>
        </div>
    </header>

    <section id="booking" class="booking-system">
        <h2 style="font-family: 'Playfair Display'; font-size: 2.5rem; margin-bottom: 40px;">Foglaljon online</h2>
        <div class="booking-card">
            <div class="booking-step">
                <label>VÁLASSZON SZOLGÁLTATÁST</label>
                <select>
                    <option>Teljes Kozmetika (Kicsi)</option>
                    <option>Teljes Kozmetika (Közepes)</option>
                    <option>Teljes Kozmetika (Nagy)</option>
                    <option>SPA Wellness kezelés</option>
                    <option>Egészségügyi nyírás</option>
                </select>
            </div>
            <div class="booking-step">
                <label>VÁLASSZON DÁTUMOT</label>
                <input type="date">
            </div>
            <div class="booking-step">
                <label>IDŐPONT</label>
                <select>
                    <option>08:00</option>
                    <option>10:30</option>
                    <option>13:00</option>
                    <option>15:30</option>
                </select>
            </div>
            <button class="book-now-btn">IDŐPONT MEGERŐSÍTÉSE</button>
        </div>
    </section>

    <section class="gallery-section" id="gallery">
        <div class="gallery-grid">
            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?q=80&w=800');"></div>
            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1537151608828-ea2b11777ee8?q=80&w=800');"></div>
            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?q=80&w=800');"></div>
            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1598133894008-61f7fdb8cc3a?q=80&w=800');"></div>
        </div>
    </section>

    <footer>
        <div class="social-deep-links">
            <a href="fb://facebook.com/ebfazont"><i class="fab fa-facebook"></i></a>
            <a href="instagram://user?username=ebfazont"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/36201234567"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p>EB-FAZONT KUTYAKOZMETIKA | 2026</p>
        <p style="font-size: 0.7rem; margin-top: 10px; opacity: 0.5;">1141 Budapest, Szugló utca 130.</p>
    </footer>

    <script>
        // Navigáció változása görgetésre
        window.onscroll = function() {
            const nav = document.getElementById('navbar');
            if (window.pageYOffset > 100) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        };

        // Javított Galéria Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    setTimeout(() => { entry.target.classList.add('is-visible'); }, 150);
                } else {
                    entry.target.classList.remove('is-visible');
                }
            });
        }, { threshold: 0.3 });

        document.querySelectorAll('.gallery-item').forEach(item => { observer.observe(item); });
    </script>
</body>
</html>
