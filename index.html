<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eb-Fazont | Prémium Kutyakozmetika</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --dark: #1a1a1a;
            --soft-cream: #f9f7f2;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--soft-cream);
            overflow-x: hidden;
        }

        /* --- HERO --- */
        header {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?q=80&w=2071&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        /* --- GALÉRIA - ITT TÖRTÉNIK A VARÁZSLAT --- */
        .gallery-container {
            padding: 100px 20px;
            background: #000;
            text-align: center;
        }

        .gallery-container h2 {
            color: white;
            font-family: 'Playfair Display', serif;
            margin-bottom: 50px;
            font-size: 2.5rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Alaphelyzet: Fekete-fehér és picit homályos */
        .gallery-item {
            aspect-ratio: 1/1;
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) brightness(0.7);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
            cursor: pointer;
        }

        /* SZÁMÍTÓGÉPES FÓKUSZ EFFEKT (Desktop) */
        @media (min-width: 1025px) {
            /* Ha a szülőre (grid) ráviszed az egeret, minden elem homályosabb lesz */
            .gallery-grid:hover .gallery-item {
                filter: grayscale(100%) brightness(0.4) blur(2px);
                transform: scale(0.95);
            }

            /* De amire konkrétan rámutatsz, az kiemelkedik */
            .gallery-grid .gallery-item:hover {
                filter: grayscale(0%) brightness(1.1) blur(0);
                transform: scale(1.1);
                z-index: 10;
                box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            }
        }

        /* MOBIL AKTÍV ÁLLAPOT (JavaScript adja hozzá görgetéskor) */
        .gallery-item.is-visible {
            filter: grayscale(0%) brightness(1);
        }

        /* --- TÉRKÉP SZAKASZ --- */
        .map-section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .map-wrapper {
            width: 100%;
            height: 450px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        iframe { width: 100%; height: 100%; border: 0; }

        footer {
            padding: 40px;
            background: var(--dark);
            color: white;
            text-align: center;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="font-family: 'Playfair Display', serif; font-size: 4rem;">Eb-Fazont</h1>
            <p style="letter-spacing: 5px;">PRÉMIUM KUTYAKOZMETIKA</p>
        </div>
    </header>

    <section class="gallery-container">
        <h2>Pillanatok a szalonból</h2>
        <div class="gallery-grid">
            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?q=80&w=600');"></div>
            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1537151608828-ea2b11777ee8?q=80&w=600');"></div>
            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?q=80&w=600');"></div>
            <div class="gallery-item" style="background-image: url('https://images.unsplash.com/photo-1598133894008-61f7fdb8cc3a?q=80&w=600');"></div>
        </div>
    </section>

    <section class="map-section">
        <h2>Hol találsz minket?</h2>
        <div class="map-wrapper">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2694.062024765697!2d19.11470557688001!3d47.52763809340848!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4741db0374e2a865%3A0xc32a68846067756e!2sBudapest%2C%20Szugl%C3%B3%20u.%20130%2C%201141!5e0!3m2!1shu!2shu!4v1700000000000" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

    <footer>
        <p>EB-FAZONT | 2026 | MINDEN JOG FENNTARTVA</p>
    </footer>

    <script>
        const observerOptions = {
            root: null,
            threshold: 0.6 // Akkor vált színesre, ha a kép 60%-a látszik
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    // Késleltetett színesedés a szép átmenetért
                    setTimeout(() => {
                        entry.target.classList.add('is-visible');
                    }, 200); 
                } else {
                    entry.target.classList.remove('is-visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.gallery-item').forEach(item => {
            observer.observe(item);
        });
    </script>
</body>
</html>
